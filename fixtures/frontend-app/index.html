<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MMC Frontend Fixture</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --fg: #172033;
        --muted: #64748b;
        --line: #cbd5e1;
        --accent: #0f766e;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border: 1px solid var(--line);
      }
      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
      }
      .state-row {
        color: var(--muted);
      }
      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Billing Dashboard</h1>
      <button type="button" aria-label="Refresh invoices">Refresh</button>
      <table aria-label="Recent invoices">
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Status</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>INV-1001</td>
            <td>Paid</td>
            <td>$120.00</td>
          </tr>
          <tr class="state-row">
            <td colspan="3">Loading, empty, error, and success states are represented for verification.</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
